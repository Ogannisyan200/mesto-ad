<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesto</title>
    <link rel="stylesheet" href="./src/pages/index.css" />
  </head>
  <body>
    <div class="page">

      <header class="header">
        <img
          class="header__logo"
          src="./src/images/logo.svg"
          alt="Логотип Место"
          title="Статистика пользователей"
        />
      </header>

      <main class="content">
        <section class="profile">
          <div class="profile__image-wrapper">
            <div class="profile__image"></div>
            <button class="profile__image-button" type="button" aria-label="Редактировать аватар"></button>
          </div>
          <div class="profile__info">
            <div class="profile__name-wrapper">
              <h1 class="profile__title"></h1>
              <button class="profile__edit-button" type="button" aria-label="Редактировать профиль"></button>
            </div>
            <p class="profile__description"></p>
          </div>
          <button class="profile__add-button" type="button" aria-label="Добавить карточку"></button>
        </section>

        <ul class="places__list"></ul>
      </main>

      <template id="card-template">
        <li class="card">
          <img class="card__image" src="" alt="" />
          <div class="card__info">
            <h2 class="card__title"></h2>
            <div class="card__like-wrapper">
              <button class="card__like-button" type="button" aria-label="Лайк"></button>
              <span class="card__like-count">0</span>
            </div>
          </div>
          <button class="card__delete-button" type="button" aria-label="Удалить карточку"></button>
        </li>
      </template>

      <template id="popup-info-definition-template">
        <div class="popup-info__definition">
          <dt class="popup-info__term"></dt>
          <dd class="popup-info__description"></dd>
        </div>
      </template>

      <template id="popup-info-user-preview-template">
        <li class="popup-info__user-item">
          <img class="popup-info__user-avatar" src="" alt="" />
          <span class="popup-info__user-name"></span>
        </li>
      </template>

      <div class="popup popup_type_edit" role="dialog" aria-label="Редактировать профиль">
        <div class="popup__container">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <h2 class="popup__title">Редактировать профиль</h2>
          <form class="popup__form" name="edit-profile" novalidate>
            <fieldset class="popup__set">
              <input
                class="popup__input popup__input_type_name"
                id="profile-name-input"
                type="text"
                name="name"
                placeholder="Имя"
                minlength="2"
                maxlength="40"
                pattern="[a-zA-Zа-яА-ЯёЁ\s\-]+"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
                required
              />
              <span class="popup__error profile-name-input-error"></span>
              <input
                class="popup__input popup__input_type_description"
                id="profile-description-input"
                type="text"
                name="description"
                placeholder="О себе"
                minlength="2"
                maxlength="200"
                required
              />
              <span class="popup__error profile-description-input-error"></span>
            </fieldset>
            <button class="popup__button popup__button_disabled" type="submit" disabled>Сохранить</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_new-card" role="dialog" aria-label="Новое место">
        <div class="popup__container">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <h2 class="popup__title">Новое место</h2>
          <form class="popup__form" name="new-card" novalidate>
            <fieldset class="popup__set">
              <input
                class="popup__input popup__input_type_card-name"
                id="card-name-input"
                type="text"
                name="name"
                placeholder="Название"
                minlength="2"
                maxlength="30"
                pattern="[a-zA-Zа-яА-ЯёЁ\s\-]+"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
                required
              />
              <span class="popup__error card-name-input-error"></span>
              <input
                class="popup__input popup__input_type_url"
                id="card-link-input"
                type="url"
                name="link"
                placeholder="Ссылка на фото"
                required
              />
              <span class="popup__error card-link-input-error"></span>
            </fieldset>
            <button class="popup__button popup__button_disabled" type="submit" disabled>Создать</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_image" role="dialog" aria-label="Просмотр изображения">
        <div class="popup__container popup__container_type_image">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <img class="popup__image" src="" alt="" />
          <p class="popup__caption"></p>
        </div>
      </div>

      <div class="popup popup_type_avatar" role="dialog" aria-label="Обновить аватар">
        <div class="popup__container">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <h2 class="popup__title">Обновить аватар</h2>
          <form class="popup__form" name="edit-avatar" novalidate>
            <fieldset class="popup__set">
              <input
                class="popup__input popup__input_type_avatar"
                id="avatar-input"
                type="url"
                name="avatar"
                placeholder="Ссылка на аватар"
                required
              />
              <span class="popup__error avatar-input-error"></span>
            </fieldset>
            <button class="popup__button popup__button_disabled" type="submit" disabled>Сохранить</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_remove-card" role="dialog" aria-label="Удаление карточки">
        <div class="popup__container popup__container_type_confirm">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <h2 class="popup__title">Вы уверены?</h2>
          <button class="popup__button popup__button_type_confirm" type="button">Да</button>
        </div>
      </div>

      <div class="popup popup_type_info" role="dialog" aria-label="Статистика пользователей">
        <div class="popup__container">
          <button class="popup__close" type="button" aria-label="Закрыть"></button>
          <h2 class="popup__title">Статистика карточек</h2>
          <dl class="popup__info-list"></dl>
          <h3 class="popup__users-title">Все пользователи:</h3>
          <ul class="popup__users-list"></ul>
        </div>
      </div>

    </div>

    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
